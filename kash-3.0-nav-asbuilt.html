<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>As-built — Phase 1 + 2</title>
<style>
  :root{ --ink:#16181d; --ink-muted:#6b7280; --ink-faint:#9aa0ad; --line:#ededed; --surface-2:#fafafa; --surface-selected:#f1f1f2; --cat-prof:#009ddc; --cat-rel:#e03a3e; --cat-body:#61bb47; }
  *{box-sizing:border-box;} body{margin:0;font-family:Figtree,-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#f6f6f7;color:var(--ink);padding:22px;}
  h1{font-size:18px;margin:0 0 4px;} .sub{font-size:12px;color:var(--ink-muted);margin-bottom:16px;}
  .wrap{display:flex;gap:20px;align-items:flex-start;}
  .rail{width:176px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;gap:2px;}
  .grp{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-muted);padding:8px 6px 2px;}
  .item{display:flex;align-items:center;gap:10px;height:44px;padding:0 10px;border-radius:5px;color:var(--ink-muted);font-size:14px;font-weight:500;}
  .item.active{background:var(--surface-selected);color:var(--ink);}
  .item svg{width:20px;height:20px;}
  svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .spacer{height:14px;}
  .right{flex:1;}
  .header{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;}
  .header .brand{font-weight:600;} .header .dot{color:var(--ink-muted);} .header time{color:var(--ink-muted);font-size:13px;}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:5px;padding:6px 12px;font-size:13px;color:var(--ink-muted);}
  .chip{display:flex;align-items:center;gap:8px;background:var(--surface-selected);border-radius:5px;padding:6px 12px;font-size:13px;color:var(--ink);}
  kbd{font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-muted);}
</style></head><body>

    <div class="item"><svg viewBox="0 0 24 24"><path d="M12 3l1.6 4L18 8.6l-4.4 1.6L12 14l-1.6-3.8L6 8.6 10.4 7z"/><path d="M18.4 14l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></svg>Abyss</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M12 21v-8"/><path d="M12 13c0-3.3 2.2-5.5 5.5-5.5C17.5 10.8 15.3 13 12 13z"/><path d="M12 15c0-2.5-2-4-5-4 0 2.5 2 4 5 4z"/></svg>Care</div>

  </div>
  <div class="right">
    <div class="header">
      <span class="brand">Kash</span><span class="dot">·</span><time>Thu, Jun 25</time>
      <span class="search">Search <kbd>⌘K</kbd></span>
      <span class="chip">Ask Claude <kbd>⌘/</kbd></span>
    </div>
  </div>
</div>
</body></html>
